# #ddev-generated
# Drupal VRT — default configuration.
#
# This file gets copied to .ddev/drupal-vrt.yaml on first run. It is YOUR
# config from that point on — edit, commit, customize freely.
#
# Schema reference and full DSL are documented in defaults/drupal-vrt.example.yaml
# in this add-on directory.

version: 1


defaults:
  # Authentication mode. One of:
  #   admin      — log in as uid 1 via `drush uli`
  #   anonymous  — no session
  #   <role>     — log in as a user with this role (requires a users.<role> entry — see drupal-vrt/defaults/drupal-vrt.example.yaml)
  auth: anonymous
  viewports: [narrow, mid, wide]
  directions: [ltr]
  fullPage: true
  timeout: 5000

modes:
  normal:
    viewports: [narrow, wide]
    directions: [ltr]
  full:
    viewports: [narrow, mid, wide]
    # Can be [ltr, rtl] if you need to test right-to-left languages.
    directions: [ltr]
  default: normal

bail: 5

pages:
  # ---------- Content ----------
  - id: home
    path: /

  - id: node-add-article
    path: /node/add/article
    # Example how to login
    auth: admin
    timeout: 10000

  - id: tt-actionlink
    path: /action-link
    auth: admin
    skipIfStatus: [403, 404]
    # Only take screenshot of viewport
    fullPage: false

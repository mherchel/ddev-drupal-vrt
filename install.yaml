name: ddev-drupal-vrt

ddev_version_constraint: ">= v1.24.0"

pre_install_actions:
  - |
    if [ ! -f ".ddev/config.yaml" ]; then
      echo "Error: Must be run inside a DDEV project"
      exit 1
    fi

project_files:
  - commands/web/vrt
  - commands/web/vrt-update
  - commands/web/vrt-report
  - docker-compose.vrt-report.yaml
  - drupal-vrt

post_install_actions:
  - |
    mkdir -p ${DDEV_APPROOT}/__screenshots__
    grep -qxF 'test-results/' ${DDEV_APPROOT}/.gitignore 2>/dev/null || echo 'test-results/' >> ${DDEV_APPROOT}/.gitignore
    grep -qxF 'playwright-report/' ${DDEV_APPROOT}/.gitignore 2>/dev/null || echo 'playwright-report/' >> ${DDEV_APPROOT}/.gitignore
    if [ ! -f "${DDEV_APPROOT}/.ddev/drupal-vrt.yaml" ]; then
      cp "${DDEV_APPROOT}/.ddev/drupal-vrt/defaults/drupal-vrt.yaml" "${DDEV_APPROOT}/.ddev/drupal-vrt.yaml"
      echo "Created .ddev/drupal-vrt.yaml from defaults — edit to customize which pages are tested."
    fi
    if [ ! -f "${DDEV_APPROOT}/.ddev/drupal-vrt.css" ]; then
      cp "${DDEV_APPROOT}/.ddev/drupal-vrt/defaults/drupal-vrt.css" "${DDEV_APPROOT}/.ddev/drupal-vrt.css"
      echo "Created .ddev/drupal-vrt.css — add CSS rules here to hide site-specific dynamic content."
    fi
    echo ""
    echo "VRT add-on installed! Next steps:"
    echo "  1. ddev restart"
    echo "  2. ddev exec -d /var/www/html/.ddev/drupal-vrt npm install"
    echo "  3. ddev exec -d /var/www/html/.ddev/drupal-vrt npx playwright install --with-deps chromium"
    echo "  4. Edit .ddev/drupal-vrt.yaml to configure pages, then commit it."
    echo ""

removal_actions:
  - rm -rf .ddev/drupal-vrt
  - rm -f .ddev/docker-compose.vrt-report.yaml
